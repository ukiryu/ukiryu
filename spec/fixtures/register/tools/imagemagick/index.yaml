---
ukiryu_schema: '1.0'
name: imagemagick
interface: imagemagick/1.0
implementations:
- name: default
  display_name: Imagemagick
  detection:
    executables: ["convert", "magick"]  # Try convert (IM6) first, then magick (IM7)
    command: ["-version"]
    pattern: 'Version: ImageMagick ([\d.]+)'
  version_scheme: semantic
  versions:
  - after: "7.0"
    file: default/7.1.yaml
  - after: "6.0"
    file: default/6.9.yaml
  default: default/6.9.yaml
