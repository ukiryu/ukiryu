# GNU bzip2 tool profile for testing
ukiryu_schema: '1.0'
name: bzip2_gnu
display_name: GNU bzip2
version: '1.0'
implements: bzip2
version_detection:
  command: --version
  pattern: 'Version ([\d.]+)'
search_paths:
  macos:
  - /usr/bin/bzip2
  linux:
  - /usr/bin/bzip2
profiles:
- name: default
  platforms:
  - macos
  - linux
  shells:
  - bash
  - zsh
  - sh
  - fish
  commands:
  - name: compress
    description: Compress files
    arguments:
    - name: inputs
      type: file
      variadic: true
      min: 1
      position: last
      description: File(s) to compress
    flags:
    - name: keep
      cli: -k
      description: Keep input files
      default: false
  - name: decompress
    description: Decompress files
    flags:
    - name: keep
      cli: -k
      description: Keep input files
      default: false
    - name: decompress
      cli: -d
      description: Decompress mode
      default: true
    arguments:
    - name: inputs
      type: file
      variadic: true
      min: 1
      position: last
      description: File(s) to decompress
