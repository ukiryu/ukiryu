name: macOS Tests (MacPorts)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  test-macos-macports:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - macos-15-intel
          - macos-15
          - macos-26
        macports-version: ['2.11.5', '2.12.0-rc1']
        ruby-version: ['3.1', '3.4', '4.0']

    steps:
      - uses: actions/checkout@v6

      # checkout schema repository
      - uses: actions/checkout@v6
        with:
          repository: ukiryu/schema
          path: schema

      # checkout register repository
      - uses: actions/checkout@v6
        with:
          repository: ukiryu/register
          ref: v1
          path: register

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Setup MacPorts
        uses: ukiryu/setup-macports@main
        id: macports
        with:
          macports-version: ${{ matrix.macports-version }}
          cache: true
          sources-provider: git
          # Disable signature checks for packages that have issues
          signature-check: 'disabled'
          install-ports: 'pandoc jq yq ImageMagick ghostscript ffmpeg exiftool inkscape'

      - name: Verify installations
        shell: bash
        run: |
          echo "=== Verifying installations ==="
          echo ""
          echo "MacPorts version:"
          port version
          echo ""
          echo "ImageMagick:"
          # Check for both magick (v7) and convert (v6) in MacPorts prefix
          if command -v /opt/local/bin/magick; then
            echo "Found 'magick' command:"
            /opt/local/bin/magick --version
          elif command -v /opt/local/bin/convert; then
            echo "Found 'convert' command:"
            /opt/local/bin/convert --version
          else
            echo "WARNING: Neither 'magick' nor 'convert' command found in /opt/local/bin"
            ls /opt/local/bin/magick /opt/local/bin/convert 2>&1 || true
          fi
          echo ""
          echo "Ghostscript:"
          /opt/local/bin/gs --version
          echo ""
          echo "FFmpeg:"
          /opt/local/bin/ffmpeg --help | head -3
          echo ""
          echo "ExifTool:"
          /opt/local/bin/exiftool -ver
          echo ""
          echo "Pandoc:"
          /opt/local/bin/pandoc --version
          echo ""
          echo "jq:"
          /opt/local/bin/jq --version
          echo ""
          echo "yq:"
          /opt/local/bin/yq --version
          echo ""
          echo "Inkscape:"
          /opt/local/bin/inkscape --version

      - name: Run tests
        shell: bash
        run: bundle exec rake spec
