# Lychee configuration for Ukiryu documentation
# https://github.com/lycheeverse/lychee

# Exclude common false positives
exclude = [
  # Local file links
  '^file://',

  # External documentation (may require auth)
  '^https://rubygems.org',
  '^https://guides.rubygems.org',

  # GitHub (rate limiting)
  '^https://github.com/.*.git#',

  # Example domains (comment out or remove as needed)
  # '^http://example.com',
  # '^https://example.org',
]

# Only check https and http links
scheme = [ 'https', 'http' ]

# Maximum number of concurrent requests
max_concurrency = 10

# Request timeout in seconds
timeout = 20

# Retry failed requests
retry = 3

# Verbose output (use string format for lychee compatibility)
verbose = "true"

# Don't show progress (use string format for lychee compatibility)
no_progress = "true"

# Accept 200 and 404 status codes
accept = [200, 404]

# Exclude private/internal domains
# exclude_private = true

# Skip mailto: and tel: links (use string format for lychee compatibility)
skip_missing = "true"

# Enforce HTTPS (use string format for lychee compatibility)
enforce_https = "false"
